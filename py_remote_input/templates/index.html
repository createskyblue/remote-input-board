<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>远程输入粘贴板</title>
  <style>
    :root {
      --bg: #eef3f0;
      --ink: #16211d;
      --muted: #65716d;
      --line: #d9e2de;
      --accent: #0f7b5f;
      --accent-2: #1d4f91;
      --danger: #b73535;
      --shadow: 0 18px 42px rgba(20, 38, 31, 0.14);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
      background:
        linear-gradient(135deg, rgba(15, 123, 95, 0.18), transparent 34%),
        linear-gradient(315deg, rgba(29, 79, 145, 0.16), transparent 32%),
        var(--bg);
      padding: 16px;
    }
    .shell {
      width: min(100%, 720px);
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto auto auto;
      gap: 14px;
    }
    .composer, .statusbar {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }
    .composer { padding: 14px; display: grid; align-content: start; gap: 8px; }
    .composerHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .headerTools {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    label { font-size: 14px; font-weight: 700; }
    .totalChars {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }
    .totalChars strong { color: var(--accent); font-size: 16px; }
    .textSurface { min-height: 220px; display: grid; grid-template-rows: minmax(0, 1fr) auto auto; gap: 8px; }
    textarea {
      width: 100%;
      height: 100%;
      min-height: 0;
      max-height: none;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      color: var(--ink);
      background: #fbfdfc;
      font: inherit;
      font-size: 19px;
      line-height: 1.65;
      resize: none;
      outline: none;
    }
    textarea:focus, .autoSendSentence input[type="number"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(15, 123, 95, 0.12);
    }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }
    .autoSendSentence {
      min-height: 48px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
    }
    .autoSendSentence input[type="checkbox"] {
      width: 22px;
      height: 22px;
      margin: 0 4px 0 0;
      accent-color: var(--accent);
      flex: 0 0 auto;
    }
    .autoSendSentence input[type="number"] {
      width: 72px;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0 10px;
      color: var(--ink);
      background: #fbfdfc;
      font: inherit;
      font-weight: 700;
      outline: none;
    }
    .actions { display: flex; gap: 10px; }
    .keyActions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .modePanel { display: grid; gap: 8px; }
    .modePanel[hidden] { display: none; }
    .modeToggle {
      min-height: 36px;
      border-radius: 999px;
      padding: 0 12px;
      color: var(--accent-2);
      background: rgba(29, 79, 145, 0.1);
      font-size: 13px;
    }
    .touchpadPanel {
      display: grid;
      gap: 10px;
    }
    .trackpad { min-height: 220px;
      border: 1px solid rgba(15, 123, 95, 0.18);
      border-radius: 18px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.88), rgba(218, 231, 226, 0.86)),
        radial-gradient(circle at 30% 20%, rgba(15, 123, 95, 0.13), transparent 34%);
      box-shadow:
        inset 0 2px 8px rgba(255, 255, 255, 0.85),
        inset 0 -16px 24px rgba(20, 38, 31, 0.08);
      touch-action: none;
      user-select: none;
      cursor: crosshair;
      position: relative;
      overflow: hidden;
    }
    .trackpad::before {
      content: "";
      position: absolute;
      inset: 12px;
      border: 1px solid rgba(15, 123, 95, 0.1);
      border-radius: 14px;
      pointer-events: none;
    }
    .trackpad.dragLocked {
      border-color: rgba(29, 79, 145, 0.46);
      box-shadow:
        inset 0 2px 8px rgba(255, 255, 255, 0.85),
        inset 0 -16px 24px rgba(20, 38, 31, 0.08),
        0 0 0 4px rgba(29, 79, 145, 0.12);
    }
    .trackpadHint {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: grid;
      gap: 6px;
      color: rgba(101, 113, 109, 0.82);
      font-size: 14px;
      font-weight: 700;
      line-height: 1.35;
      text-align: center;
      pointer-events: none;
    }
    .tapDebug {
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      text-align: center;
    }
    .mouseActions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    button {
      min-height: 48px;
      border: 0;
      border-radius: 12px;
      padding: 0 18px;
      color: #fff;
      background: var(--accent);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }
    .sendButton {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .enterIcon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-left: 3px;
      font-size: 24px;
      line-height: 1;
      transform: translateY(-1px);
    }
    button.secondary { color: var(--accent); background: rgba(15, 123, 95, 0.1); }
    button.keyButton {
      color: var(--accent-2);
      background: rgba(29, 79, 145, 0.1);
    }
    button.mouseButton { color: var(--accent-2); background: rgba(29, 79, 145, 0.12); }
    button:disabled { opacity: 0.62; cursor: wait; }
    .progressTrack { height: 8px; overflow: hidden; border-radius: 999px; background: #dce6e2; }
    .progressFill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 80ms linear;
    }
    .historyPanel { padding: 14px; background: rgba(255, 255, 255, 0.92); border: 1px solid var(--line); border-radius: 18px; box-shadow: var(--shadow); }
    .historyHeader { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
    .historyHeader h2 { margin: 0; font-size: 16px; }
    .historyList { display: grid; gap: 8px; max-height: 32vh; overflow: auto; }
    .historyItem { border: 1px solid var(--line); border-radius: 12px; padding: 10px; background: #fbfdfc; white-space: pre-wrap; word-break: break-word; font-size: 14px; line-height: 1.45; }
    .historyItem.clickable { cursor: pointer; }
    .historyItem.clickable:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(15, 123, 95, 0.12);
      outline: none;
    }
    .historyMeta { color: var(--muted); font-size: 12px; margin-bottom: 4px; }
    .statusbar { padding: 12px 14px; color: var(--muted); font-size: 14px; min-height: 48px; }
    .statusbar.error { color: var(--danger); }
    @media (max-width: 520px) {
      body { padding: 10px; }
      .toolbar { grid-template-columns: 1fr; }
      .actions { grid-column: 1 / -1; display: grid; grid-template-columns: 1fr 1fr; }
      .headerTools { gap: 8px; }
      .textSurface, .trackpad { min-height: 260px; }
      .composerHeader { align-items: flex-start; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="composer">
      <div class="composerHeader">
        <label for="text">输入内容</label>
        <div class="headerTools">
          <button id="modeToggle" class="modeToggle" type="button">触控板</button>
          <div class="totalChars">累计字数 <strong id="totalChars">0</strong></div>
        </div>
      </div>

      <div id="textPanel" class="modePanel">
        <div class="textSurface">
          <textarea id="text" autofocus placeholder="在这里用豆包输入法语音输入"></textarea>
          <div class="progressTrack" aria-hidden="true"><div id="progressFill" class="progressFill"></div></div>
          <div id="autoSendSentence" class="autoSendSentence">
            <input id="autoSend" type="checkbox" checked aria-label="启用自动发送">
            <span id="autoSendPrefix">在</span>
            <input id="delaySeconds" type="number" inputmode="decimal" min="0.1" max="30" step="0.1" value="2">
            <span id="autoSendSuffix">秒后自动发送！</span>
          </div>
        </div>
        <div class="actions">
          <button id="send" class="sendButton" type="button" aria-label="发送或回车">发送<span class="enterIcon" aria-hidden="true">⏎</span></button>
          <button id="clear" class="secondary" type="button">清空</button>
        </div>
        <div class="keyActions" aria-label="方向键">
          <button id="keyUp" class="keyButton" type="button">↑ 上键</button>
          <button id="keyDown" class="keyButton" type="button">↓ 下键</button>
        </div>
      </div>

      <div id="touchpadPanel" class="modePanel touchpadPanel" hidden>
        <div id="trackpad" class="trackpad" role="application" aria-label="鼠标触控板">
          <div class="trackpadHint">
            <span>滑动控制鼠标</span>
            <span>单指单击：左键</span>
            <span>双指单击：右键</span>
            <span>双击按住：拖拽</span>
          </div>
        </div>
        <div id="tapDebug" class="tapDebug">双击间隔：-- ms</div>
        <div class="mouseActions">
          <button id="mouseLeft" class="mouseButton" type="button">左键</button>
          <button id="mouseRight" class="mouseButton" type="button">右键</button>
          <button id="mouseKeyUp" class="keyButton" type="button">↑ 上键</button>
          <button id="mouseKeyDown" class="keyButton" type="button">↓ 下键</button>
        </div>
      </div>
    </section>

    <section class="historyPanel">
      <div class="historyHeader">
        <h2>最近 30 条发送历史</h2>
        <button id="clearHistory" class="secondary" type="button">清空历史</button>
      </div>
      <div id="historyList" class="historyList"></div>
    </section>

    <div id="status" class="statusbar">等待输入。</div>
  </main>

  <script>
    const AUTO_SEND_STORAGE_KEY = "remoteInput.autoSendEnabled";
    const DELAY_STORAGE_KEY = "remoteInput.autoSendDelaySeconds";
    const HISTORY_STORAGE_KEY = "remoteInput.history";
    const TOTAL_CHARS_STORAGE_KEY = "remoteInput.totalChars";
    const REALTIME_PATH = "/ws";
    const HISTORY_LIMIT = 30;
    const text = document.getElementById("text");
    const textPanel = document.getElementById("textPanel");
    const touchpadPanel = document.getElementById("touchpadPanel");
    const modeToggle = document.getElementById("modeToggle");
    const trackpad = document.getElementById("trackpad");
    const tapDebug = document.getElementById("tapDebug");
    const autoSend = document.getElementById("autoSend");
    const delaySeconds = document.getElementById("delaySeconds");
    const autoSendPrefix = document.getElementById("autoSendPrefix");
    const autoSendSuffix = document.getElementById("autoSendSuffix");
    const sendButton = document.getElementById("send");
    const clearButton = document.getElementById("clear");
    const keyUpButton = document.getElementById("keyUp");
    const keyDownButton = document.getElementById("keyDown");
    const mouseLeftButton = document.getElementById("mouseLeft");
    const mouseRightButton = document.getElementById("mouseRight");
    const mouseKeyUpButton = document.getElementById("mouseKeyUp");
    const mouseKeyDownButton = document.getElementById("mouseKeyDown");
    const statusNode = document.getElementById("status");
    const progressFill = document.getElementById("progressFill");
    const historyList = document.getElementById("historyList");
    const clearHistory = document.getElementById("clearHistory");
    const totalChars = document.getElementById("totalChars");

    let pendingTimer = null;
    let progressTimer = null;
    let countdownStartedAt = 0;
    let sending = false;
    let syncingKey = false;
    let currentMode = "text";
    const activeTrackpadPointers = new Map();
    let tapStartedAt = 0;
    let tapPointerCount = 0;
    let tapMoved = false;
    const TAP_MAX_MS = 220;
    const TAP_MAX_MOVE = 8;
    const DOUBLE_TAP_MAX_MS = 180;
    const TRACKPAD_ACCELERATION_SPEED_THRESHOLD = 0.45;
    const TRACKPAD_ACCELERATION_MAX = 1.8;
    const TRACKPAD_ACCELERATION_GAIN = 1.4;
    const TRACKPAD_VERTICAL_SCALE_MIN = 0.68;
    let lastClickDownAt = 0;
    let pendingSingleTapTimer = null;
    let tapStartedDrag = false;
    let dragLocked = false;
    let pendingMouseDx = 0;
    let pendingMouseDy = 0;
    let mouseFrame = null;
    let realtimeSocket = null;
    let realtimeReconnectTimer = null;

    function focusComposer() {
      if (currentMode !== "text") return;
      try {
        text.focus({ preventScroll: true });
      } catch {
        text.focus();
      }
      try {
        text.setSelectionRange(text.value.length, text.value.length);
      } catch {
      }
    }

    function primeMobileKeyboard() {
      focusComposer();
      setTimeout(focusComposer, 200);
    }

    function focusComposerOnFirstTouch() {
      if (document.activeElement !== text) focusComposer();
      document.removeEventListener("pointerdown", focusComposerOnFirstTouch);
      document.removeEventListener("touchstart", focusComposerOnFirstTouch);
    }

    function setMode(mode) {
      currentMode = mode;
      const mouseMode = mode === "mouse";
      textPanel.hidden = mouseMode;
      touchpadPanel.hidden = !mouseMode;
      modeToggle.textContent = mouseMode ? "输入" : "触控板";
      stopCountdown();
      if (mouseMode) {
        text.blur();
        setStatus("触控板模式。");
      } else {
        if (dragLocked) setDragLocked(false);
        resetClickChain();
        setStatus("输入模式。");
        focusComposer();
      }
    }


    function loadHistory() {
      try {
        const raw = window.localStorage.getItem(HISTORY_STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }

    function saveHistory(items) {
      window.localStorage.setItem(HISTORY_STORAGE_KEY, JSON.stringify(items.slice(0, HISTORY_LIMIT)));
    }

    function normalizeTotalChars(value) {
      const count = Number.parseInt(value, 10);
      return Number.isFinite(count) && count > 0 ? count : 0;
    }

    function updateTotalChars(count) {
      totalChars.textContent = count.toLocaleString("zh-CN");
    }

    function loadTotalChars() {
      updateTotalChars(normalizeTotalChars(window.localStorage.getItem(TOTAL_CHARS_STORAGE_KEY)));
    }

    function addTypedChars(value) {
      const current = normalizeTotalChars(window.localStorage.getItem(TOTAL_CHARS_STORAGE_KEY));
      const next = current + Array.from(value).length;
      window.localStorage.setItem(TOTAL_CHARS_STORAGE_KEY, next.toString());
      updateTotalChars(next);
    }

    function confirmHistoryOverwrite() {
      return window.confirm("输入框已有内容，要覆盖当前输入内容吗？");
    }

    function applyHistoryItem(item) {
      if (item.kind !== "text" || typeof item.text !== "string") return;
      if (text.value.trim() && !confirmHistoryOverwrite()) {
        focusComposer();
        return;
      }

      stopCountdown();
      text.value = item.text;
      setStatus("已填充历史记录，可编辑后发送。");
      focusComposer();
    }

    function renderHistory() {
      const items = loadHistory();
      historyList.innerHTML = "";
      if (items.length === 0) {
        const empty = document.createElement("div");
        empty.className = "historyItem";
        empty.textContent = "暂无发送历史。";
        historyList.appendChild(empty);
        return;
      }
      for (const item of items) {
        const node = document.createElement("div");
        node.className = "historyItem";
        if (item.kind === "text" && typeof item.text === "string") {
          node.classList.add("clickable");
          node.setAttribute("role", "button");
          node.setAttribute("tabindex", "0");
          node.addEventListener("click", () => applyHistoryItem(item));
          node.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              applyHistoryItem(item);
            }
          });
        }
        const meta = document.createElement("div");
        meta.className = "historyMeta";
        meta.textContent = new Date(item.createdAt).toLocaleString();
        const body = document.createElement("div");
        body.textContent = item.kind === "key" ? "[按键] " + item.key : item.text;
        node.appendChild(meta);
        node.appendChild(body);
        historyList.appendChild(node);
      }
    }

    function addHistoryItem(item) {
      const items = loadHistory();
      items.unshift({ ...item, createdAt: new Date().toISOString() });
      saveHistory(items);
      renderHistory();
    }
    function setStatus(message, isError = false) {
      statusNode.textContent = message;
      statusNode.classList.toggle("error", isError);
    }

    function stopCountdown() {
      clearTimeout(pendingTimer);
      clearInterval(progressTimer);
      pendingTimer = null;
      progressTimer = null;
      progressFill.style.width = "0%";
    }

    function normalizeDelaySeconds(value) {
      const seconds = Number.parseFloat(value);
      if (!Number.isFinite(seconds) || seconds <= 0) return 2;
      return Math.min(30, Math.max(0.1, seconds));
    }

    function loadSavedDelay() {
      const savedValue = window.localStorage.getItem(DELAY_STORAGE_KEY);
      if (savedValue !== null) delaySeconds.value = normalizeDelaySeconds(savedValue).toString();
    }

    function loadSavedAutoSend() {
      const savedValue = window.localStorage.getItem(AUTO_SEND_STORAGE_KEY);
      if (savedValue !== null) autoSend.checked = savedValue === "true";
    }

    function saveAutoSend() {
      window.localStorage.setItem(AUTO_SEND_STORAGE_KEY, autoSend.checked ? "true" : "false");
    }

    function renderAutoSendCopy() {
      autoSendPrefix.textContent = autoSend.checked ? "在" : "要在";
      autoSendSuffix.textContent = autoSend.checked ? "秒后自动发送！" : "秒后自动发送吗？";
    }

    function saveDelayDraft() {
      window.localStorage.setItem(DELAY_STORAGE_KEY, delaySeconds.value);
    }

    function commitDelay() {
      const seconds = normalizeDelaySeconds(delaySeconds.value);
      delaySeconds.value = seconds.toString();
      window.localStorage.setItem(DELAY_STORAGE_KEY, seconds.toString());
    }

    function getAutoSendDelay() {
      return normalizeDelaySeconds(delaySeconds.value) * 1000;
    }

    function startCountdown() {
      stopCountdown();
      if (!autoSend.checked || sending || !text.value.trim()) return;

      const autoSendDelay = getAutoSendDelay();
      countdownStartedAt = Date.now();
      setStatus("停止输入后 " + (autoSendDelay / 1000).toString() + " 秒自动发送。");
      progressTimer = setInterval(() => {
        const elapsed = Date.now() - countdownStartedAt;
        progressFill.style.width = Math.min(100, (elapsed / autoSendDelay) * 100) + "%";
      }, 50);
      pendingTimer = setTimeout(() => sendText({ source: "auto" }), autoSendDelay);
    }

    function getRealtimeUrl() {
      const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
      return protocol + "//" + window.location.host + REALTIME_PATH;
    }

    function scheduleRealtimeReconnect() {
      if (realtimeReconnectTimer !== null) return;
      realtimeReconnectTimer = window.setTimeout(() => {
        realtimeReconnectTimer = null;
        connectRealtime();
      }, 900);
    }

    function connectRealtime() {
      if (!("WebSocket" in window)) return;
      if (realtimeSocket && (
        realtimeSocket.readyState === WebSocket.OPEN ||
        realtimeSocket.readyState === WebSocket.CONNECTING
      )) return;

      try {
        realtimeSocket = new WebSocket(getRealtimeUrl());
      } catch {
        realtimeSocket = null;
        return;
      }

      realtimeSocket.addEventListener("open", () => {
        if (realtimeReconnectTimer !== null) {
          window.clearTimeout(realtimeReconnectTimer);
          realtimeReconnectTimer = null;
        }
      });
      realtimeSocket.addEventListener("message", (event) => {
        try {
          const payload = JSON.parse(event.data);
          if (payload && payload.ok === false) setStatus(payload.error || "实时控制失败", true);
        } catch {
        }
      });
      realtimeSocket.addEventListener("close", scheduleRealtimeReconnect);
      realtimeSocket.addEventListener("error", () => {
        try {
          realtimeSocket.close();
        } catch {
        }
      });
    }

    async function sendRealtime(message, fallback) {
      if (realtimeSocket && realtimeSocket.readyState === WebSocket.OPEN) {
        try {
          realtimeSocket.send(JSON.stringify(message));
          return { ok: true, realtime: true };
        } catch {
        }
      }
      connectRealtime();
      return fallback();
    }

    async function postJson(url, payload) {
      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const result = await response.json();
      if (!response.ok) throw new Error(result.error || "请求失败");
      return result;
    }

    function flushMouseMove() {
      mouseFrame = null;
      const dx = Math.round(pendingMouseDx);
      const dy = Math.round(pendingMouseDy);
      pendingMouseDx = 0;
      pendingMouseDy = 0;
      if (dx === 0 && dy === 0) return;
      syncMouseMove(dx, dy);
    }

    function queueMouseMove(dx, dy) {
      pendingMouseDx += dx;
      pendingMouseDy += dy;
      if (mouseFrame === null) mouseFrame = window.requestAnimationFrame(flushMouseMove);
    }

    function applyTrackpadAcceleration(dx, dy, elapsedMs) {
      const distance = Math.hypot(dx, dy);
      if (distance === 0) return { dx, dy };

      const speed = distance / Math.max(8, elapsedMs);
      if (speed <= TRACKPAD_ACCELERATION_SPEED_THRESHOLD) return { dx, dy };

      const boost = Math.pow(speed - TRACKPAD_ACCELERATION_SPEED_THRESHOLD, 1.15) * TRACKPAD_ACCELERATION_GAIN;
      const factor = Math.min(TRACKPAD_ACCELERATION_MAX, 1 + boost);
      return { dx: dx * factor, dy: dy * factor };
    }

    function getTrackpadVerticalScale() {
      const width = trackpad.clientWidth || 1;
      const height = trackpad.clientHeight || width;
      return Math.min(1, Math.max(TRACKPAD_VERTICAL_SCALE_MIN, height / width));
    }

    function normalizeTrackpadDelta(dx, dy, verticalScale) {
      return { dx, dy: dy * verticalScale };
    }

    async function syncMouseMove(dx, dy) {
      try {
        await sendRealtime(
          { type: "mouseMove", dx, dy },
          () => postJson("/api/mouse/move", { dx, dy })
        );
      } catch (error) {
        setStatus(error.message || "鼠标移动失败", true);
      }
    }

    async function syncMouseClick(button) {
      try {
        await sendRealtime(
          { type: "mouseClick", button },
          () => postJson("/api/mouse/click", { button })
        );
      } catch (error) {
        setStatus(error.message || "鼠标点击失败", true);
      }
    }

    async function syncMouseButton(button, action) {
      try {
        await sendRealtime(
          { type: "mouseButton", button, action },
          () => postJson("/api/mouse/button", { button, action })
        );
      } catch (error) {
        setStatus(error.message || "鼠标按键失败", true);
      }
    }

    function setDragLocked(locked) {
      if (dragLocked === locked) return;
      dragLocked = locked;
      trackpad.classList.toggle("dragLocked", dragLocked);
      syncMouseButton("left", locked ? "down" : "up");
      setStatus(locked ? "拖拽中，松开结束。" : "拖拽结束。");
    }

    async function sendText(options = {}) {
      const payloadText = text.value;
      if (!payloadText.trim() || sending) return;

      stopCountdown();
      sending = true;
      sendButton.disabled = true;
      setStatus(options.source === "auto" ? "自动发送中..." : "发送中...");

      try {
        const result = await postJson("/api/type", { text: payloadText });
        addHistoryItem({ kind: "text", text: payloadText });
        addTypedChars(payloadText);
        text.value = "";
        setStatus("已发送，耗时 " + (result.durationMs || 0) + " ms。");
      } catch (error) {
        setStatus(error.message || "发送失败", true);
      } finally {
        sending = false;
        sendButton.disabled = false;
        progressFill.style.width = "0%";
      }
    }

    async function syncKey(key) {
      if (syncingKey) return;
      stopCountdown();
      syncingKey = true;

      try {
        await sendRealtime(
          { type: "key", key },
          () => postJson("/api/key", { key })
        );


      } catch (error) {
        setStatus(error.message || "按键同步失败", true);
      } finally {
        syncingKey = false;
      }
    }

    function syncBackspace() {
      syncKey("backspace");
    }

    function syncEnter(event) {
      event.preventDefault();
      syncKey("enter");
    }

    function sendOrEnter() {
      if (text.value.trim()) {
        sendText({ source: "manual" });
      } else {
        syncKey("enter");
      }
    }

    function sendOnEnter(event) {
      if (!text.value.trim() || sending) return;
      event.preventDefault();
      sendText({ source: "enter" });
    }

    text.addEventListener("beforeinput", (event) => {
      if (event.inputType === "deleteContentBackward" && text.value === "") syncBackspace();
      if (event.inputType === "insertLineBreak") {
        text.value.trim() ? sendOnEnter(event) : syncEnter(event);
      }
    });
    text.addEventListener("keydown", (event) => {
      if (event.key === "Backspace" && text.value === "") syncBackspace();
      if (event.key === "Enter") {
        text.value.trim() ? sendOnEnter(event) : syncEnter(event);
      }
    });
    text.addEventListener("input", startCountdown);
    delaySeconds.addEventListener("input", () => {
      saveDelayDraft();
      startCountdown();
    });
    delaySeconds.addEventListener("blur", () => {
      commitDelay();
      startCountdown();
    });
    autoSend.addEventListener("change", () => {
      saveAutoSend();
      renderAutoSendCopy();
      if (autoSend.checked) startCountdown();
      else {
        stopCountdown();
        setStatus("自动发送已关闭。");
      }
    });
    sendButton.addEventListener("click", sendOrEnter);
    keyUpButton.addEventListener("click", () => syncKey("up"));
    keyDownButton.addEventListener("click", () => syncKey("down"));
    modeToggle.addEventListener("click", () => setMode(currentMode === "text" ? "mouse" : "text"));
    mouseLeftButton.addEventListener("click", () => syncMouseClick("left"));
    mouseRightButton.addEventListener("click", () => syncMouseClick("right"));
    mouseKeyUpButton.addEventListener("click", () => syncKey("up"));
    mouseKeyDownButton.addEventListener("click", () => syncKey("down"));
    function resetTrackpadTap() {
      tapStartedAt = 0;
      tapPointerCount = 0;
      tapMoved = false;
      tapStartedDrag = false;
    }

    function cancelPendingSingleTapClick() {
      if (pendingSingleTapTimer === null) return;
      window.clearTimeout(pendingSingleTapTimer);
      pendingSingleTapTimer = null;
    }

    function resetClickChain() {
      cancelPendingSingleTapClick();
      lastClickDownAt = 0;
    }

    function flushPendingSingleTapClick() {
      if (pendingSingleTapTimer === null) return;
      cancelPendingSingleTapClick();
      lastClickDownAt = 0;
      syncMouseClick("left");
    }

    function scheduleSingleTapClick(startedAt) {
      cancelPendingSingleTapClick();
      lastClickDownAt = startedAt;
      pendingSingleTapTimer = window.setTimeout(() => {
        pendingSingleTapTimer = null;
        lastClickDownAt = 0;
        syncMouseClick("left");
      }, DOUBLE_TAP_MAX_MS);
    }

    function updateTapDebug(tapIntervalMs, detail = "") {
      const value = tapIntervalMs === null ? "--" : Math.round(tapIntervalMs).toString();
      tapDebug.textContent = "双击间隔：" + value + " ms" + (detail ? "，" + detail : "");
    }

    function startDragFromDoubleTap(tapIntervalMs) {
      resetClickChain();
      tapStartedDrag = true;
      updateTapDebug(tapIntervalMs, "已触发拖拽");
      setDragLocked(true);
    }

    function finishTrackpadTap(cancelled = false) {
      const elapsed = performance.now() - tapStartedAt;
      const shouldClick = !cancelled && tapStartedAt && !tapMoved && elapsed <= TAP_MAX_MS;
      const pointerCount = tapPointerCount;
      const startedAt = tapStartedAt;
      const startedDrag = tapStartedDrag;
      resetTrackpadTap();
      if (startedDrag) return;
      if (!shouldClick) {
        resetClickChain();
        return;
      }
      if (pointerCount >= 2) {
        resetClickChain();
        syncMouseClick("right");
        return;
      }
      scheduleSingleTapClick(startedAt);
    }

    trackpad.addEventListener("pointerdown", (event) => {
      event.preventDefault();
      if (activeTrackpadPointers.size === 0) {
        const startedAt = performance.now();
        tapStartedAt = startedAt;
        tapPointerCount = 0;
        tapMoved = false;
        tapStartedDrag = false;
        const tapIntervalMs = lastClickDownAt > 0 ? startedAt - lastClickDownAt : null;
        if (!dragLocked && tapIntervalMs !== null && tapIntervalMs < DOUBLE_TAP_MAX_MS) {
          startDragFromDoubleTap(tapIntervalMs);
        } else {
          if (tapIntervalMs !== null) flushPendingSingleTapClick();
          updateTapDebug(tapIntervalMs, tapIntervalMs === null ? "" : "未触发");
        }
      }
      activeTrackpadPointers.set(event.pointerId, {
        startX: event.clientX,
        startY: event.clientY,
        lastX: event.clientX,
        lastY: event.clientY,
        lastAt: event.timeStamp,
        verticalScale: getTrackpadVerticalScale(),
      });
      tapPointerCount = Math.max(tapPointerCount, activeTrackpadPointers.size);
      trackpad.setPointerCapture(event.pointerId);
    });
    trackpad.addEventListener("pointermove", (event) => {
      const pointer = activeTrackpadPointers.get(event.pointerId);
      if (!pointer) return;
      event.preventDefault();
      const totalDx = event.clientX - pointer.startX;
      const totalDy = event.clientY - pointer.startY;
      if (Math.hypot(totalDx, totalDy) > TAP_MAX_MOVE) {
        tapMoved = true;
        if (!dragLocked) {
          resetClickChain();
          updateTapDebug(null, "已重置");
        }
      }
      const dx = event.clientX - pointer.lastX;
      const dy = event.clientY - pointer.lastY;
      const elapsedMs = event.timeStamp - pointer.lastAt;
      const normalized = normalizeTrackpadDelta(dx, dy, pointer.verticalScale);
      const adjusted = applyTrackpadAcceleration(normalized.dx, normalized.dy, elapsedMs);
      pointer.lastX = event.clientX;
      pointer.lastY = event.clientY;
      pointer.lastAt = event.timeStamp;
      if (activeTrackpadPointers.size === 1) queueMouseMove(adjusted.dx, adjusted.dy);
    });
    trackpad.addEventListener("pointerup", (event) => {
      activeTrackpadPointers.delete(event.pointerId);
      if (activeTrackpadPointers.size === 0) {
        if (dragLocked) {
          setDragLocked(false);
          resetTrackpadTap();
          return;
        }
        finishTrackpadTap();
      }
    });
    trackpad.addEventListener("pointercancel", (event) => {
      activeTrackpadPointers.delete(event.pointerId);
      if (activeTrackpadPointers.size === 0) {
        if (dragLocked) {
          setDragLocked(false);
          resetTrackpadTap();
          return;
        }
        finishTrackpadTap(true);
      }
    });
    clearHistory.addEventListener("click", () => {
      saveHistory([]);
      renderHistory();
      setStatus("历史已清空。");
    });
    clearButton.addEventListener("click", () => {
      stopCountdown();
      text.value = "";
      setStatus("已清空。");
      focusComposer();
    });

    loadSavedAutoSend();
    loadSavedDelay();
    renderAutoSendCopy();
    loadTotalChars();
    renderHistory();
    connectRealtime();
    primeMobileKeyboard();
    window.addEventListener("pageshow", primeMobileKeyboard);
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") {
        connectRealtime();
        primeMobileKeyboard();
      }
    });
    document.addEventListener("pointerdown", focusComposerOnFirstTouch);
    document.addEventListener("touchstart", focusComposerOnFirstTouch);
  </script>
</body>
</html>
